<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hOCR Side-by-Side Viewer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .header { padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input, textarea { background: #2a2a2a; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; }
        input { flex: 1; }
        textarea { flex: 2; height: 38px; resize: none; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Image Pane */
        #viewer-viewport { flex: 1; overflow: auto; position: relative; background: #000; padding: 20px; }
        #viewer-container { position: relative; margin: 0 auto; }
        #source-image { display: block; width: 800px; height: auto; }
        
        /* Transcript Pane */
        #transcript-pane { width: 400px; background: #1e1e1e; border-left: 1px solid #333; overflow-y: auto; padding: 20px; line-height: 1.6; }
        .ts-para { padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; transition: 0.2s; }
        .ts-para:hover { background: #2a2a2a; border-color: #555; }
        
        /* Overlay Boxes */
        .ocr-para { position: absolute; border: 1px solid rgba(0, 255, 127, 0.4); background: rgba(0, 255, 127, 0.05); pointer-events: all; }
        
        /* Sync Highlighting */
        .highlight { background: rgba(0, 123, 255, 0.3) !important; border: 2px solid #007bff !important; z-index: 10; }
    </style>
</head>
<body>

    <div class="header">
        <div class="controls">
            <input type="text" id="img-url" placeholder="Image URL" value="https://iiif-cloud.princeton.edu/iiif/2/9f%2F6a%2F69%2F9f6a69cf00c5499bb7c2fdbba587fba4%2Fintermediate_file/full/4827,/0/default.jpg">
            <textarea id="hocr-input" placeholder="Paste hOCR XML here..."></textarea>
            <button onclick="render()">Load Page</button>
        </div>
    </div>

    <div class="main-layout">
        <div id="viewer-viewport">
            <div id="viewer-container">
                <img id="source-image" src="">
                <div id="ocr-overlay"></div>
            </div>
        </div>
        <div id="transcript-pane">
            <h3 style="margin-top:0">Transcript</h3>
            <div id="transcript-content">Paste data and click Load to begin...</div>
        </div>
    </div>

    <script>
        function parseBBox(title) {
            const match = title?.match(/bbox (\d+) (\d+) (\d+) (\d+)/);
            return match ? match.slice(1).map(Number) : null;
        }

        function render() {
            const hocrData = document.getElementById('hocr-input').value;
            const img = document.getElementById('source-image');
            const overlay = document.getElementById('ocr-overlay');
            const transcript = document.getElementById('transcript-content');
            
            if (!hocrData) return;

            img.src = document.getElementById('img-url').value;
            overlay.innerHTML = "";
            transcript.innerHTML = "";

            img.onload = () => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(hocrData, "text/html");
                const pageInfo = parseBBox(doc.querySelector('.ocr_page')?.getAttribute('title'));
                const scale = img.clientWidth / (pageInfo ? pageInfo[2] : 4827);

                doc.querySelectorAll('.ocr_par').forEach((para, idx) => {
                    const bbox = parseBBox(para.getAttribute('title'));
                    const text = para.textContent.replace(/\s+/g, ' ').trim();
                    if (!bbox || !text) return;

                    const id = `block-${idx}`;

                    // Create Image Overlay
                    const box = document.createElement('div');
                    box.className = 'ocr-para';
                    box.id = `box-${id}`;
                    box.style.cssText = `
                        left: ${bbox[0] * scale}px; top: ${bbox[1] * scale}px;
                        width: ${(bbox[2] - bbox[0]) * scale}px; height: ${(bbox[3] - bbox[1]) * scale}px;
                    `;

                    // Create Transcript Entry
                    const tsEntry = document.createElement('div');
                    tsEntry.className = 'ts-para';
                    tsEntry.id = `ts-${id}`;
                    tsEntry.innerText = text;

                    // Sync Interactions
                    const onIn = () => { box.classList.add('highlight'); tsEntry.classList.add('highlight'); };
                    const onOut = () => { box.classList.remove('highlight'); tsEntry.classList.remove('highlight'); };

                    box.onmouseenter = onIn; box.onmouseleave = onOut;
                    tsEntry.onmouseenter = onIn; tsEntry.onmouseleave = onOut;

                    overlay.appendChild(box);
                    transcript.appendChild(tsEntry);
                });
            };
        }
    </script>
</body>
</html>
